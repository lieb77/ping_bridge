ping_bridge.tab:
  path: '/node/{node}/ping'
  defaults:
    _title: 'Ping Bridgy'
    _form: 'Drupal\ping_bridge\Form\PingForm'
  requirements:
    _permission: 'post to bluesky'
  options:
    _admin_route: TRUE
    parameters:
      node:
        type: entity:node

ping_bridge.settings:
  path: '/admin/config/services/ping-bridge-settings'
  defaults:
    _title: 'Ping Bridge Settings'
    _form: 'Drupal\ping_bridge\Form\SettingsForm'
  requirements:
    _permission: 'administer bsky_post configuration'